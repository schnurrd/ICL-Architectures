name: tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements_ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_ci.txt
          pip install -e ./PFNs -e ./prior-repos/tabpfn-v1-prior -e ./prior-repos/tabularpriors

      - name: Run tests
        env:
          FLA_EXCLUDE_MODEL_TYPES: mamba2
        run: |
          pytest -q PFNs/tests
